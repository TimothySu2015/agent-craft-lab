name: Feature Request
description: Suggest a new feature or enhancement
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your proposed solution or feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Engine (core workflow execution)
        - Web (React frontend)
        - API (backend endpoints)
        - Search (CraftSearch)
        - Flow (structured execution)
        - Cleaner (data cleaning)
        - Documentation
        - Other
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, mockups, or references.
