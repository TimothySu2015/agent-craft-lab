name: Bug Report
description: Report a bug to help us improve
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Windows 11, macOS 15, Ubuntu 24.04"
  - type: input
    id: dotnet
    attributes:
      label: .NET SDK Version
      placeholder: "e.g., 10.0.100"
  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "e.g., 20.11.0"
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem.
